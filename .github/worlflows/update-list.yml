name: Auto Update list.json

on:
  push:
    paths:
      - 'text/**.md'          # 只在 text 目录的 md 文件变动时触发
  workflow_dispatch:          # 允许手动触发

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # 授予写入仓库的权限
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate list.json
        run: |
          cd text
          # 列出所有 .md 文件，生成 JSON 数组
          files=$(ls *.md 2>/dev/null | jq -R -s -c 'split("\n") | map(select(length > 0))')
          # 如果没有文件，给一个空数组
          if [ -z "$files" ]; then files="[]"; fi
          # 构造最终 JSON，每篇文章保留 name, title, cover 字段
          # title 默认取文件名（去掉 .md），cover 使用默认封面
          echo "$files" | jq '[.[] | {name: ., title: (./".md")[0], cover: "images/default-cover.jpg"}]' > ../list.json
        shell: bash

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add list.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自动更新 list.json" && git push)