name: Auto Update list.json

on:
  push:
    paths:
      - 'text/**.md'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate list.json with category
        run: |
          cd text
          files=$(ls *.md 2>/dev/null)
          if [ -z "$files" ]; then
            echo "[]" > ../list.json
            exit 0
          fi

          echo "$files" | jq -R -s -c '
            split("\n") | map(select(length > 0)) |
            map(
              . as $filename |
              ($filename | rtrimstr(".md")) as $fullname |

              # 尝试匹配「分类」格式
              (if $fullname | test("「.*」") then
                ($fullname | capture("「(?<cat>.*?)」\\s*(?<title>.*)") // {cat: ($fullname | sub("「(?<cat>.*?)」.*"; "\(.cat)")), title: ($fullname | sub("「.*?」\\s*"; ""))})
              else
                {cat: "未分类", title: $fullname}
              end) as $parsed |

              {
                name: $filename,
                title: (if ($parsed.title | length > 0) then $parsed.title else $fullname end),
                cover: "images/default-cover.jpg",
                category: $parsed.cat
              }
            )
          ' > ../list.json
        shell: bash

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add list.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新 list.json（含分类）" && git push)