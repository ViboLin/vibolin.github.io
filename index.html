<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AsukaLin">
    <meta name="keywords" content="AsukaLin, blog, 技术博客">
    <title>AsukaLin</title>

    <!-- 防闪烁脚本（必须在 head 最前面） -->
    <script>
        (function () {
            const stored = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
            if (stored) {
                document.documentElement.setAttribute('data-theme', stored);
            } else {
                document.documentElement.setAttribute('data-theme', prefersDark.matches ? 'dark' : 'light');
            }
            prefersDark.addEventListener('change', (e) => {
                if (!localStorage.getItem('theme')) {
                    document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
                }
            });
        })();
    </script>

    <!-- 样式表 -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="fonts/iconfont.css">

    <!-- marked.js（异步加载） -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
</head>
<body>

    <button class="theme-toggle" id="themeToggle" aria-label="切换暗色/亮色主题" title="切换主题">🌓</button>

    <div class="main-layout">
        <!-- 左侧个人信息 -->
        <aside class="sidebar" aria-label="个人信息">
            <div class="glass-card">
                <img class="avatar" src="images/avatar.jpeg" alt="AsukaLin 的头像" loading="lazy">
                <h2>AsukaLin</h2>
                <p class="bio">这里是一段个人简介，可以写你的技术栈、兴趣爱好等。</p>

                <div class="social-links">
                    <a href="https://github.com/vibolin" target="_blank" rel="noopener" class="btn-link">GitHub</a>
                    <a href="https://gitee.com/asukalin02" target="_blank" rel="noopener" class="btn-link">Gitee</a>
                </div>

                <div class="github-chart">
                    <h2>GitHub 贡献</h2>
                    <div class="chart-clip">
                        <img src="https://ghchart.rshah.org/vibolin" alt="GitHub 年度贡献图" loading="lazy">
                    </div>
                </div>
            </div>

            <!-- 微缩版音乐播放器 -->
            <div class="mini-player" role="region" aria-label="音乐播放器">
                <div class="player-main">
                    <div class="player-body">
                        <div class="player-cover">
                            <img id="mini-cover-img" src="images/music/sound01.jpeg" alt="专辑封面" loading="lazy">
                        </div>
                        <div class="player-info">
                            <div class="song-name" id="mini-song-name">Sea of Tranquility</div>
                            <div class="song-singer" id="mini-singer">Nigel Stanford</div>
                        </div>
                    </div>
                    <div class="progress-area">
                        <div class="progress-time">
                            <span id="mini-current-time">00:00</span>
                            <span id="mini-total-time">00:00</span>
                        </div>
                        <div class="progress-bar" id="mini-progress-bar" role="slider" aria-label="播放进度" tabindex="0">
                            <div class="progress-filled" id="mini-progress-filled"></div>
                        </div>
                    </div>
                    <div class="controls-row">
                        <div class="control-buttons">
                            <button id="mini-prev-btn" title="上一曲" aria-label="上一曲">
                                <span class="iconfont icon-step-backward"></span>
                            </button>
                            <button id="mini-play-btn" title="播放" aria-label="播放">
                                <span class="iconfont icon-play-circle"></span>
                            </button>
                            <button id="mini-next-btn" title="下一曲" aria-label="下一曲">
                                <span class="iconfont icon-step-forward"></span>
                            </button>
                            <button id="mini-volume-btn" title="音量" aria-label="音量">
                                <span class="iconfont icon-sound"></span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="volume-extension" id="mini-volume-extension">
                    <input type="range" min="0" max="1" step="0.01" value="0.8"
                           class="vertical-volume" id="mini-vertical-volume" aria-label="音量滑块">
                </div>
            </div>
                    <!-- 导航模块：分类 + 最近文章 -->
        <div class="glass-card nav-module">
            <div class="nav-section">
                <h2 class="nav-title">文章分类</h2>
                <div class="category-list" id="category-list">
                <!-- 动态生成分类按钮 -->
                </div>
            </div>
            <div class="nav-section">
                <h2 class="nav-title">最近文章</h2>
                <ul class="recent-posts" id="recent-posts">
                <!-- 动态生成最近文章 -->
                </ul>
            </div>
        </div>
        </aside>

        <!-- 右侧内容区 -->
        <main class="content" id="main-content">
            <div id="articles-container" class="articles-list" aria-label="文章列表"></div>
            <div id="content" class="article-content" style="display: none;" aria-live="polite"></div>
        </main>
    </div>

    <!-- 脚本（defer 保证顺序执行） -->
    <script src="js/app.js" defer></script>
    <script src="js/music-player.js" defer></script>
</body>
</html>
